name: CI

on:
  push:
    branches: [main, master, develop, backend, frontend]
  pull_request:
    branches: [main, master, develop, backend, frontend]

env:
  NODE_VERSION: "20"
  JWT_KEY: ci-test-jwt-secret-min-32-characters-long
  JWT_REFRESH_KEY: ci-test-refresh-secret-min-32-chars-long
  STRIPE_KEY: sk_test_ci_placeholder
  FRONTEND_URL: http://localhost:3000

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.ref_name == 'backend' && '.' || 'Backend' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ github.ref_name == 'backend' && 'package-lock.json' || 'Backend/package-lock.json' }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: ${{ github.ref_name == 'backend' && 'coverage' || 'Backend/coverage' }}

  frontend:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.ref_name == 'frontend' && '.' || 'Frontend' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ github.ref_name == 'frontend' && 'package-lock.json' || 'Frontend/package-lock.json' }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .js

      - name: Unit tests
        run: npm test -- --watchAll=false --passWithNoTests --coverage
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:2030/shopai

      - name: Production build
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:2030/shopai

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: ${{ github.ref_name == 'frontend' && 'coverage' || 'Frontend/coverage' }}

  docker-smoke:
    name: Docker — health smoke
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Create deploy env
        run: |
          cp .env.docker.example .env
          sed -i 's/change-me-in-production-min-32-chars/ci-test-jwt-secret-min-32-characters-long/' .env
          sed -i 's/change-me-refresh-in-production-min-32/ci-test-refresh-secret-min-32-chars/' .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${BACKEND_PORT:-2030}/health"; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1
        env:
          BACKEND_PORT: 2030

      - name: Tear down
        if: always()
        run: docker compose down -v
