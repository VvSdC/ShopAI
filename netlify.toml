# Netlify — React frontend (monorepo: base is Frontend/)
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/
#
# REQUIRED: Set REACT_APP_API_URL in Netlify UI before deploy:
#   Site settings → Environment variables → Add variable
#   Key: REACT_APP_API_URL
#   Value: https://your-actual-api.onrender.com/shopai
#   Scopes: Production (and Deploy previews if needed)
# Then trigger Deploy → Clear cache and deploy site (env is baked at build time).

[build]
  base    = "Frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  # REACT_APP_API_URL — set in Netlify UI (Site settings → Environment variables).
  # Do NOT hardcode here; CRA bakes it at build time. Must end with /shopai
  # Suppress react-scripts CI strict warnings-as-errors on Netlify
  CI = "false"

# SPA catch-all — all routes serve index.html so React Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: http://localhost:2030; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; base-uri 'self'; form-action 'self';"
