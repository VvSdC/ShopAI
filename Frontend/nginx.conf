server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # Security headers (API is on a separate origin; connect-src allows HTTPS backends)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: http://localhost:2030; frame-src https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; base-uri 'self'; form-action 'self';" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
